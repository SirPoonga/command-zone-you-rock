[project]
playlist_url = "https://www.youtube.com/playlist?list=PLyLzs6vB3Xk7u8L3xGBsM5wo8Ms5jUIxh"
data_dir = "data"
screenshots_dir = "screenshots"
markdown_file = "YOU_ROCK.md"

[detection]
patterns = [
  "\\byou(?: all| guys)?(?: really| absolutely| totally| seriously)? rock\\b",
]
window_snippets = 6
context_before = 4
context_after = 5
dedupe_seconds = 20

[capture]
# Browser capture launches a persistent, interactive Google Chrome profile and
# captures rendered video frames without downloading the video through yt-dlp.
backend = "browser"
browser_channel = "chrome"
browser_profile_dir = ".browser-profile"
browser_timeout_seconds = 180
bookmark_scan_before_seconds = 30
bookmark_sample_every_seconds = 5
seconds_before = 7
seconds_after = 9
sample_every_seconds = 1
max_height = 720
crop_top_fraction = 0.70
ocr_language = "eng"

# Leave both blank for anonymous access. Set only one when YouTube requires authentication.
cookies_from_browser = ""
cookies_file = ""
