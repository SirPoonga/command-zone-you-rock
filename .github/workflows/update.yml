name: Update You Rock List

on:
  workflow_dispatch:
  schedule:
    - cron: "23 7 * * 1,4"
      timezone: "America/Chicago"

permissions:
  contents: write

concurrency:
  group: update-you-rock-list
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Scan new episodes
        run: yourock scan --limit 5 --retry-errors --sleep 2

      - name: Rebuild Markdown
        run: yourock build

      - name: Commit changes
        run: |
          if git diff --quiet -- data YOU_ROCK.md; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data YOU_ROCK.md
          git commit -m "Update You Rock index"
          git push
